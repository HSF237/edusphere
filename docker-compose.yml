version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/zerowaste
      - JWT_SECRET=super_secret_zerowaste_key_12345!
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - zerowaste_db:/data/db
    restart: unless-stopped

volumes:
  zerowaste_db:
